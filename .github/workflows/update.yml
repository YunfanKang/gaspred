name: Update predictions

# Refreshes site/data/predictions.json and publishes site/ to GitHub Pages via Actions.
# (Branch-folder Pages only allows / or /docs, so we deploy the site/ folder as an artifact.)

on:
  schedule:
    - cron: "30 13 * * *"   # daily 13:30 UTC — after EIA's Tue/Wed releases. Adjust freely.
  workflow_dispatch: {}      # allow manual runs from the Actions tab

permissions:
  contents: write            # commit the refreshed data back
  pages: write               # deploy to Pages
  id-token: write            # required by actions/deploy-pages

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Build predictions
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python update.py --out site/data/predictions.json -v

      - name: Commit refreshed data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/data/predictions.json
          if git diff --staged --quiet; then
            echo "No data change."
          else
            git commit -m "data: refresh predictions [skip ci]"
            git push
          fi

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
